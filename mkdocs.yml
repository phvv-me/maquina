site_name: mainboard
site_description: Hardware topology and machine snapshots for Python.
site_url: https://phvv.me/mainboard/
repo_url: https://github.com/phvv-me/mainboard
repo_name: phvv-me/mainboard
copyright: Apache-2.0 · Pedro Valois

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guide:
      - Units: units.md
      - Probe and Snapshot: probe.md
  - Reference:
      - Environment: environment.md
      - Toolchain: toolchain.md
      - Board: board.md
      - Providers: providers.md
  - API: api.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            show_bases: true
            heading_level: 2
            members_order: source
            filters: ["!^_", "!^model_"]
            inherited_members: false
            separate_signature: false
            show_signature_annotations: false
            docstring_section_style: table
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      fallback_to_default: true
      languages:
        - locale: en
          name: 🇺🇸 English
          default: true
        - locale: pt-BR
          name: 🇧🇷 Português (BR)
          build: true
        - locale: es
          name: 🇲🇽 Español
          build: true
        - locale: ja
          name: 🇯🇵 日本語
          build: true
        - locale: zh
          name: 🇨🇳 简体中文
          build: true
  - llmstxt:
      markdown_description: Hardware topology and machine snapshots for Python.
      full_output: llms-full.txt
      sections:
        Usage:
          - index.md
          - units.md
          - probe.md
        Reference:
          - environment.md
          - toolchain.md
          - board.md
          - providers.md
