name: CI

on:
  pull_request:
  workflow_call: # publish.yml runs this exact gate on main before publishing
  workflow_dispatch: # manual runs (e.g. to validate main directly between releases)

jobs:
  test:
    # Each OS is a distinct real hardware setup the probe runs against:
    #   ubuntu-latest  -> x86_64 Linux (no accelerator)
    #   macos-latest   -> Apple Silicon (real Apple GPU + NPU)
    #   macos-13       -> x86_64 Intel mac
    #   windows-latest -> x86_64 Windows (env probe via whoami; full hardware probe pending)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyrefly check
      # gated unit/property suite with coverage (POSIX + Apple paths); Windows can't run those
      - run: uv run pytest -m "not integration" --cov=mainboard
        if: matrix.os != 'windows-latest'
      # Windows runs the hermetic suite as a portability guard, without the coverage gate
      - run: uv run pytest -m "not integration"
        if: matrix.os == 'windows-latest'
      # real probe against this runner's actual hardware (skipped on Windows: no full probe yet)
      - run: uv run pytest -m integration
        if: matrix.os != 'windows-latest'
