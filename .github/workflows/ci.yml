name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Each OS is a distinct real hardware setup the probe runs against:
    #   ubuntu-latest  -> x86_64 Linux (no accelerator)
    #   macos-latest   -> Apple Silicon (real Apple GPU + NPU)
    #   macos-13       -> x86_64 Intel mac
    #   windows-latest -> x86_64 Windows (hermetic suite only; no native probe yet)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyrefly check
      # gated unit/property suite with coverage
      - run: uv run pytest -m "not integration" --cov=mainboard
      # real probe against this runner's actual hardware (skipped on Windows: no native probe yet)
      - run: uv run pytest -m integration
        if: matrix.os != 'windows-latest'
